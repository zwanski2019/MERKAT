<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding | Merkat OS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Geist:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#002113",
                    "on-background": "#161d19",
                    "error": "#ba1a1a",
                    "tertiary": "#a43a3a",
                    "secondary-fixed": "#e4e1e6",
                    "primary-fixed": "#6ffbbe",
                    "surface": "#f4fbf4",
                    "on-surface": "#161d19",
                    "primary": "#006c49",
                    "inverse-primary": "#4edea3",
                    "secondary": "#5f5e61",
                    "surface-dim": "#d4dcd5",
                    "outline": "#6c7a71",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffdad7",
                    "surface-container-low": "#eef6ee",
                    "on-primary-container": "#00422b",
                    "on-error-container": "#93000a",
                    "secondary-container": "#e4e1e6",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#e8f0e9",
                    "inverse-surface": "#2b322d",
                    "on-tertiary-fixed": "#410005",
                    "error-container": "#ffdad6",
                    "primary-fixed-dim": "#4edea3",
                    "inverse-on-surface": "#ebf3eb",
                    "on-secondary-container": "#656467",
                    "primary-container": "#10b981",
                    "outline-variant": "#bbcabf",
                    "on-secondary-fixed": "#1b1b1e",
                    "on-secondary-fixed-variant": "#47464a",
                    "on-tertiary-container": "#711419",
                    "surface-bright": "#f4fbf4",
                    "tertiary-container": "#fc7c78",
                    "on-primary-fixed-variant": "#005236",
                    "surface-tint": "#006c49",
                    "secondary-fixed-dim": "#c8c5ca",
                    "on-surface-variant": "#3c4a42",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e3eae3",
                    "on-error": "#ffffff",
                    "surface-container-highest": "#dde4dd",
                    "tertiary-fixed-dim": "#ffb3af",
                    "on-primary": "#ffffff",
                    "background": "#f4fbf4",
                    "on-tertiary-fixed-variant": "#842225",
                    "surface-variant": "#dde4dd"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "8px",
                    "header_height": "64px",
                    "sidebar_width": "260px",
                    "xl": "32px",
                    "md": "16px",
                    "lg": "24px",
                    "container_gutter": "24px",
                    "base": "4px",
                    "xs": "4px"
            },
            "fontFamily": {
                    "section-header": ["Geist"],
                    "page-title": ["Geist"],
                    "meta": ["Inter"],
                    "data-tabular": ["Geist"],
                    "body-sm": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "section-header": ["16px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "page-title": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "meta": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "data-tabular": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .onboarding-gradient {
            background: radial-gradient(circle at 50% -20%, #f0fdf4 0%, transparent 60%);
        }
        .card-active {
            border-color: #006c49 !important;
            background-color: #ffffff;
            box-shadow: 0 4px 20px -4px rgba(0, 108, 73, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center overflow-x-hidden onboarding-gradient">
<main class="max-w-5xl w-full px-lg py-xl flex flex-col items-center">
<!-- Logo Header -->
<div class="mb-xl flex flex-col items-center gap-xs">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">package_2</span>
</div>
<span class="font-page-title text-page-title text-primary tracking-tight">Merkat</span>
</div>
<!-- Heading -->
<div class="text-center mb-xl">
<h1 class="font-page-title text-[32px] leading-tight text-on-surface mb-sm">What kind of business are you setting up?</h1>
<p class="font-body-md text-on-surface-variant max-w-md mx-auto">Select the category that best fits your daily operations to help us personalize your workspace.</p>
</div>
<!-- Selection Tiles -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-lg w-full mb-xl">
<!-- Card 1: Retail & Cosmetics (Selected) -->
<button class="group relative flex flex-col items-start p-xl bg-surface-container-lowest border border-outline-variant rounded-xl text-left transition-all duration-300 hover:border-primary hover:shadow-lg card-active" onclick="selectCard(this)">
<div class="absolute top-4 right-4 text-primary" id="check-icon-1">
<span class="material-symbols-outlined text-2xl fill-icon">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-lg group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-3xl">shopping_bag</span>
</div>
<h3 class="font-section-header text-section-header text-on-surface mb-xs">Retail &amp; Cosmetics</h3>
<p class="font-body-sm text-on-surface-variant">Manage boutiques, salons, or beauty supply stores with specialized inventory tools.</p>
</button>
<!-- Card 2: Restaurant & Café -->
<button class="group relative flex flex-col items-start p-xl bg-surface-container-lowest border border-outline-variant rounded-xl text-left transition-all duration-300 hover:border-primary hover:shadow-lg" onclick="selectCard(this)">
<div class="absolute top-4 right-4 text-primary hidden">
<span class="material-symbols-outlined text-2xl fill-icon">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center mb-lg group-hover:bg-primary-container group-hover:text-on-primary-container transition-all duration-300">
<span class="material-symbols-outlined text-3xl">restaurant</span>
</div>
<h3 class="font-section-header text-section-header text-on-surface mb-xs">Restaurant &amp; Café</h3>
<p class="font-body-sm text-on-surface-variant">Ideal for bakeries, coffee shops, and diners focused on fast-paced service.</p>
</button>
<!-- Card 3: General Store -->
<button class="group relative flex flex-col items-start p-xl bg-surface-container-lowest border border-outline-variant rounded-xl text-left transition-all duration-300 hover:border-primary hover:shadow-lg" onclick="selectCard(this)">
<div class="absolute top-4 right-4 text-primary hidden">
<span class="material-symbols-outlined text-2xl fill-icon">check_circle</span>
</div>
<div class="w-14 h-14 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center mb-lg group-hover:bg-primary-container group-hover:text-on-primary-container transition-all duration-300">
<span class="material-symbols-outlined text-3xl">storefront</span>
</div>
<h3 class="font-section-header text-section-header text-on-surface mb-xs">General Store</h3>
<p class="font-body-sm text-on-surface-variant">Perfect for supermarkets and multi-category retail with high-volume SKU needs.</p>
</button>
</div>
<!-- Footer Actions -->
<div class="flex flex-col items-center gap-lg">
<p class="font-meta text-meta text-on-surface-variant">You can change this later in settings</p>
<button class="px-xl py-md bg-primary text-on-primary rounded-full font-section-header text-section-header flex items-center gap-sm hover:bg-on-primary-fixed-variant transition-colors shadow-sm active:scale-95 duration-200">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Decorative Background Visual -->
<div class="fixed bottom-0 left-0 w-full h-1/3 -z-10 opacity-30 pointer-events-none">
<div class="absolute inset-0 bg-gradient-to-t from-primary-fixed to-transparent"></div>
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-px bg-outline-variant"></div>
</div>
</main>
<script>
        function selectCard(element) {
            // Remove active classes from all buttons
            document.querySelectorAll('button[onclick="selectCard(this)"]').forEach(btn => {
                btn.classList.remove('card-active');
                const check = btn.querySelector('.absolute');
                if(check) check.classList.add('hidden');
                
                const iconContainer = btn.querySelector('.w-14');
                iconContainer.classList.remove('bg-primary-container', 'text-on-primary-container');
                iconContainer.classList.add('bg-surface-container-highest', 'text-on-surface-variant');
            });

            // Add active classes to selected
            element.classList.add('card-active');
            const check = element.querySelector('.absolute');
            if(check) check.classList.remove('hidden');

            const iconContainer = element.querySelector('.w-14');
            iconContainer.classList.add('bg-primary-container', 'text-on-primary-container');
            iconContainer.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
        }
    </script>
</body></html>
