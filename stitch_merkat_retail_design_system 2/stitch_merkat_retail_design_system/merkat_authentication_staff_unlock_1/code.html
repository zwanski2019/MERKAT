<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        input:focus {

        }

                        "secondary": "#5f5e61",
                        "on-tertiary-container": "#711419",
                        "surface-variant": "#dde4dd",
                        "on-primary-fixed-variant": "#005236",

                        "on-tertiary-fixed-variant": "#842225",

<body class="bg-background font-body-md text-on-surface h-full overflow-hidden">
<main class="flex h-full flex-col md:flex-row">
<!-- LEFT HALF: Administrative Login -->
<section class="w-full md:w-1/2 flex items-center justify-center p-xl border-outline-variant border-r-0 md:border-r bg-surface-container-low relative">
<!-- Subtle atmospheric background effect -->
<div class="absolute inset-0 opacity-10 pointer-events-none">

</div>
<div class="z-10 w-full max-w-sm">
<div class="flex flex-col items-center mb-xl">
<!-- Tenant Logo Placeholder -->
<div class="w-16 h-16 bg-surface-container-highest rounded-xl flex items-center justify-center mb-md border border-outline-variant">
<span class="material-symbols-outlined text-primary text-[32px]">storefront</span>
</div>
<h1 class="font-page-title text-page-title text-center">MERKAT</h1>
<p class="text-on-surface-variant font-body-sm mt-xs">Enterprise Administration</p>
</div>
<div class="space-y-md">
<div>
<label class="block font-meta text-meta text-on-surface-variant uppercase mb-xs px-xs" for="email">Email Address</label>
<input class="w-full px-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md transition-all focus:ring-1 focus:ring-primary" id="email" placeholder="admin@mainstreet.com" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-xs px-xs">
<label class="block font-meta text-meta text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-meta text-meta text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<input class="w-full px-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md transition-all focus:ring-1 focus:ring-primary" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-md px-lg rounded-lg font-section-header hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg">
                        Sign in
                        <span class="material-symbols-outlined">login</span>
</button>
</div>
<div class="mt-xl text-center">
<p class="font-body-sm text-on-surface-variant">
                        By signing in, you agree to the 
                        <a class="text-primary hover:underline" href="#">Terms of Service</a>
</p>
</div>
</div>
</section>
<!-- RIGHT HALF: Staff Unlock -->
<section class="w-full md:w-1/2 flex items-center justify-center p-xl bg-surface">
<div class="w-full max-w-md flex flex-col h-full justify-between py-md">
<div class="text-center">
<h2 class="font-section-header text-section-header text-on-surface">Main Street Retail</h2>
<p class="font-meta text-meta text-on-surface-variant uppercase tracking-widest mt-xs">Terminal 04</p>
</div>
<!-- Staff Avatar Selection -->
<div class="mt-xl overflow-x-auto no-scrollbar">
<div class="flex justify-center gap-md px-md" id="staff-row">
<!-- Staff 1 -->
<button class="flex flex-col items-center gap-sm group" onclick="selectStaff(this, 'Sarah M.')">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-transparent group-active:scale-95 transition-all staff-avatar">
<span class="font-section-header text-on-surface-variant">SM</span>
</div>
<span class="font-body-sm text-on-surface-variant">Sarah M.</span>
</button>
<!-- Staff 2 (Active example) -->
<button class="flex flex-col items-center gap-sm group" onclick="selectStaff(this, 'John D.')">
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center border-2 border-primary group-active:scale-95 transition-all staff-avatar">
<span class="font-section-header text-on-primary-container">JD</span>
</div>
<span class="font-body-sm text-on-surface">John D.</span>
</button>
<!-- Staff 3 -->
<button class="flex flex-col items-center gap-sm group" onclick="selectStaff(this, 'Elena K.')">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-transparent group-active:scale-95 transition-all staff-avatar">
<span class="font-section-header text-on-surface-variant">EK</span>
</div>
<span class="font-body-sm text-on-surface-variant">Elena K.</span>
</button>
<!-- Staff 4 -->
<button class="flex flex-col items-center gap-sm group" onclick="selectStaff(this, 'Kevin T.')">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-transparent group-active:scale-95 transition-all staff-avatar">
<span class="font-section-header text-on-surface-variant">KT</span>
</div>
<span class="font-body-sm text-on-surface-variant">Kevin T.</span>
</button>
</div>
</div>
<!-- PIN Entry Display -->
<div class="mt-xl flex justify-center items-center gap-md">
<div class="pin-dot w-4 h-4 rounded-full bg-outline-variant" id="dot-0"></div>
<div class="pin-dot w-4 h-4 rounded-full bg-outline-variant" id="dot-1"></div>
<div class="pin-dot w-4 h-4 rounded-full bg-outline-variant" id="dot-2"></div>
<div class="pin-dot w-4 h-4 rounded-full bg-outline-variant" id="dot-3"></div>
</div>
<!-- Numeric PIN Pad -->
<div class="mt-xl grid grid-cols-3 gap-sm md:gap-md mx-auto w-full max-w-[320px]">
<!-- Rows of numbers -->
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('1')">1</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('2')">2</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('3')">3</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('4')">4</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('5')">5</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('6')">6</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('7')">7</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('8')">8</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('9')">9</button>
<div class="h-16 md:h-20"></div>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low rounded-xl font-data-tabular text-xl md:text-2xl hover:bg-surface-container-highest active:scale-90 transition-all border border-outline-variant" onclick="addPin('0')">0</button>
<button class="h-16 md:h-20 flex items-center justify-center bg-surface-container-low text-tertiary rounded-xl hover:bg-tertiary-container hover:text-on-tertiary-container active:scale-90 transition-all border border-outline-variant" onclick="removePin()">
<span class="material-symbols-outlined text-3xl">backspace</span>
</button>
</div>
<!-- Footer help -->
<div class="mt-lg text-center flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-on-surface-variant text-sm">help</span>
<span class="font-meta text-meta text-on-surface-variant">Tap your profile to unlock terminal</span>
</div>
</div>
</section>
</main>
<script>
        let pin = "";
        const maxPinLength = 4;

        function addPin(num) {
            if (pin.length < maxPinLength) {
                pin += num;
                updateDots();
                if (pin.length === maxPinLength) {
                    setTimeout(() => {
                        handleUnlock();
                    }, 200);
                }
            }
        }

        function removePin() {
            if (pin.length > 0) {
                pin = pin.slice(0, -1);
                updateDots();
            }
        }

        function updateDots() {
            for (let i = 0; i < maxPinLength; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < pin.length) {
                    dot.classList.add('active', 'bg-primary-container');
                    dot.classList.remove('bg-outline-variant');
                } else {
                    dot.classList.remove('active', 'bg-primary-container');
                    dot.classList.add('bg-outline-variant');
                }
            }
        }

        function handleUnlock() {
            // Mock success visual
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach(dot => {
                dot.classList.add('bg-primary');
            });
            
            console.log("Unlocking terminal for selected staff with PIN:", pin);
            
            // Success animation/redirect would go here
            setTimeout(() => {
                pin = "";
                updateDots();
            }, 500);
        }

        function selectStaff(element, name) {
            // Reset all
            const avatars = document.querySelectorAll('.staff-avatar');
            avatars.forEach(av => {
                av.classList.remove('bg-primary-container', 'border-primary');
                av.classList.add('bg-surface-container-high', 'border-transparent');
                av.nextElementSibling.classList.remove('text-on-surface');
                av.nextElementSibling.classList.add('text-on-surface-variant');
                av.querySelector('span').classList.remove('text-on-primary-container');
                av.querySelector('span').classList.add('text-on-surface-variant');
            });

            // Set active
            const av = element.querySelector('.staff-avatar');
            av.classList.remove('bg-surface-container-high', 'border-transparent');
            av.classList.add('bg-primary-container', 'border-primary');
            av.nextElementSibling.classList.remove('text-on-surface-variant');
            av.nextElementSibling.classList.add('text-on-surface');
            av.querySelector('span').classList.remove('text-on-surface-variant');
            av.querySelector('span').classList.add('text-on-primary-container');
            
            // Clear PIN when switching staff
            pin = "";
            updateDots();
        }
    </script>
</body></html>
